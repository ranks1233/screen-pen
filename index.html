<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Screen Pen</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <canvas id="draw-canvas"></canvas>

    <aside id="toolbar" aria-label="Screen Pen toolbar">
      <div id="drag-spacer" class="drag-spacer" aria-hidden="true"></div>

      <div class="tool-stack">
        <button id="draw-btn" class="tool-btn active" title="Draw" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              fill="currentColor"
              d="M3.5 20.5l1.2-4.2L16.8 4.2a2.1 2.1 0 0 1 3 3L7.7 19.3l-4.2 1.2z"
            />
            <path fill="#ffd7a8" d="M16.4 4.6l3 3-1.5 1.5-3-3z" />
          </svg>
        </button>
        <button id="shape-btn" class="tool-btn" title="Shapes" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect
              x="3.5"
              y="3.5"
              width="10"
              height="10"
              rx="1"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
            />
            <circle
              cx="16.5"
              cy="16.5"
              r="4.2"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
            />
          </svg>
        </button>
        <button id="color-btn" class="tool-btn" title="Color" type="button">
          <span id="color-swatch" class="color-swatch"></span>
        </button>
        <button id="settings-btn" class="tool-btn" title="Settings" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              fill="currentColor"
              d="M19.14 12.94c.04-.31.06-.63.06-.94s-.02-.63-.06-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.1 7.1 0 0 0-1.63-.94l-.36-2.54a.5.5 0 0 0-.5-.42h-3.84a.5.5 0 0 0-.5.42l-.36 2.54c-.58.23-1.12.54-1.63.94l-2.39-.96a.5.5 0 0 0-.6.22L2.71 8.84a.5.5 0 0 0 .12.64l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94L2.83 14.5a.5.5 0 0 0-.12.64l1.92 3.32c.13.23.4.32.64.22l2.39-.96c.5.4 1.05.72 1.63.94l.36 2.54c.05.24.26.42.5.42h3.84c.24 0 .45-.18.5-.42l.36-2.54c.58-.22 1.12-.54 1.63-.94l2.39.96c.24.1.51 0 .64-.22l1.92-3.32a.5.5 0 0 0-.12-.64l-2.03-1.58zM12 15.5A3.5 3.5 0 1 1 12 8a3.5 3.5 0 0 1 0 7.5z"
            />
          </svg>
        </button>
      </div>
    </aside>

    <div
      id="size-preview"
      class="size-preview"
      title="Brush size (Shift + scroll)"
      aria-hidden="true"
    ></div>

    <div id="color-panel" class="panel hidden" role="dialog" aria-label="Color picker">
      <div class="preset-row" id="color-presets"></div>
      <label class="field">
        <span>Custom</span>
        <input id="color-input" type="color" value="#ff2d2d" />
      </label>
    </div>

    <div id="shape-panel" class="panel shape-panel hidden" role="dialog" aria-label="Shape picker">
      <div class="shape-row" id="shape-options">
        <button
          type="button"
          class="shape-option"
          data-shape="rect"
          title="Rectangle"
          aria-label="Rectangle"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect
              x="4"
              y="5"
              width="16"
              height="14"
              rx="1.5"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            />
          </svg>
        </button>
        <button
          type="button"
          class="shape-option"
          data-shape="ellipse"
          title="Ellipse"
          aria-label="Ellipse"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <ellipse
              cx="12"
              cy="12"
              rx="8"
              ry="6.5"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            />
          </svg>
        </button>
        <button
          type="button"
          class="shape-option"
          data-shape="arrow"
          title="Arrow"
          aria-label="Arrow"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M4 12h12.5M12.5 6.5 19 12l-6.5 5.5"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>
      </div>
    </div>

    <div id="settings-panel" class="panel hidden" role="dialog" aria-label="Settings">
      <div class="panel-header">
        <h2 id="settings-title">Settings</h2>
      </div>
      <div class="settings-scroll">
      <div id="settings-basic">
        <label class="field">
          <span>Activate hotkey</span>
          <button id="hotkey-btn" type="button" class="hotkey-btn">Ctrl+Alt+D</button>
        </label>
        <div class="field">
          <div class="field-label-row">
            <span>Color panel hotkey</span>
            <label class="hotkey-enable" title="Enable color panel hotkey">
              <input type="checkbox" id="color-hotkey-enabled" checked />
            </label>
          </div>
          <button id="color-hotkey-btn" type="button" class="hotkey-btn">C</button>
        </div>
        <div class="field">
          <div class="field-label-row">
            <span>Shape panel hotkey</span>
            <label class="hotkey-enable" title="Enable shape panel hotkey">
              <input type="checkbox" id="shape-hotkey-enabled" checked />
            </label>
          </div>
          <button id="shape-hotkey-btn" type="button" class="hotkey-btn">S</button>
        </div>
        <label class="field">
          <span>Size change modifier for scroll</span>
          <button id="size-hotkey-btn" type="button" class="hotkey-btn">Shift</button>
        </label>
        <label class="field">
          <span>Size scroll sensitivity <strong id="sensitivity-value">4</strong></span>
          <input
            id="size-sensitivity"
            type="range"
            min="1"
            max="10"
            step="1"
            value="4"
          />
        </label>
        <label class="field">
          <span>Line smoothing <strong id="smooth-strength-value">5</strong></span>
          <input
            id="smooth-strength"
            type="range"
            min="0"
            max="10"
            step="1"
            value="5"
          />
        </label>
        <button
          id="advanced-settings-toggle"
          type="button"
          class="advanced-toggle"
          aria-expanded="false"
          aria-controls="advanced-settings"
        >
          Advanced settings
        </button>
      </div>
      <div id="advanced-settings" class="advanced-settings hidden">
        <fieldset class="field brush-persist-field">
          <legend>Line settings</legend>
          <label class="radio-row">
            <input
              type="checkbox"
              id="show-line-thickness-handle"
              checked
            />
            <span>Thickness handle</span>
          </label>
          <label class="radio-row">
            <input
              type="checkbox"
              id="show-line-opacity-handle"
              checked
            />
            <span>Opacity handle</span>
          </label>
          <label class="radio-row">
            <input
              type="checkbox"
              id="apply-thickness-to-brush"
              checked
            />
            <span>Apply handle thickness to brush size</span>
          </label>
        </fieldset>
        <fieldset class="field brush-persist-field">
          <legend>Shape settings</legend>
          <label class="radio-row">
            <input
              type="checkbox"
              id="show-shape-thickness-handle"
              checked
            />
            <span>Thickness handle</span>
          </label>
          <label class="radio-row">
            <input
              type="checkbox"
              id="show-shape-opacity-handle"
              checked
            />
            <span>Opacity handle</span>
          </label>
          <label class="radio-row">
            <input
              type="checkbox"
              id="return-to-freehand-after-shape"
              checked
            />
            <span>Return to free-draw when shape is finished</span>
          </label>
          <label class="radio-row">
            <input
              type="checkbox"
              id="show-arrow-tip-pivot"
              checked
            />
            <span>Add pivot handle for arrows</span>
          </label>
        </fieldset>
        <fieldset class="field brush-persist-field">
          <legend>Brush color &amp; size</legend>
          <label class="radio-row">
            <input
              type="radio"
              name="brush-persistence"
              id="brush-persist-default"
              value="default"
            />
            <span>Use defaults each time</span>
          </label>
          <label class="radio-row">
            <input
              type="radio"
              name="brush-persistence"
              id="brush-persist-remember"
              value="rememberLast"
              checked
            />
            <span>Remember last used</span>
          </label>
        </fieldset>
        <div id="brush-defaults" class="brush-defaults hidden">
          <div class="field">
            <span>Default color</span>
            <div class="default-color-picker" id="default-color-picker">
              <div
                class="default-color-flyout"
                id="default-color-presets"
                role="listbox"
                aria-label="Default colors"
              ></div>
              <button
                id="default-color-btn"
                type="button"
                class="default-color-btn"
                title="Default color"
                aria-label="Default color"
                aria-expanded="false"
                aria-controls="default-color-presets"
              >
                <span id="default-color-swatch" class="color-swatch"></span>
              </button>
            </div>
          </div>
          <label class="field">
            <span>Default size <strong id="default-size-value">4</strong></span>
            <input
              id="default-size"
              type="range"
              min="1"
              max="80"
              step="1"
              value="4"
            />
          </label>
        </div>
        <div class="field color-editing">
          <span>Color editing</span>
          <div class="preset-row" id="edit-color-presets"></div>
          <label class="field">
            <span>Custom</span>
            <input id="edit-color-input" type="color" value="#ff2d2d" />
          </label>
          <button id="add-preset-btn" type="button" class="add-preset-btn" disabled>
            Add this color to defaults
          </button>
          <button id="reset-presets-btn" type="button" class="add-preset-btn reset-presets-btn">
            Reset colors to defaults
          </button>
        </div>
        <button
          id="hide-advanced-settings"
          type="button"
          class="advanced-toggle"
          aria-expanded="true"
          aria-controls="advanced-settings"
        >
          Hide advanced settings
        </button>
      </div>
      </div>
      <div class="settings-actions">
        <button id="settings-close" type="button">Done</button>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
